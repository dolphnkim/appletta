// ═══════════════════════════════════════════════════════════════════
// MARKDOWN RENDERER
// ═══════════════════════════════════════════════════════════════════

function parseInline(text, baseKey) {
  const els = []; let buf = ''; let i = 0; let ki = baseKey || 0;
  const flush = () => { if (buf) { els.push(<React.Fragment key={ki++}>{buf}</React.Fragment>); buf = ''; } };
  while (i < text.length) {
    if (text[i] === '*' && text[i+1] === '*') {
      flush();
      const end = text.indexOf('**', i+2);
      if (end === -1) { buf += '**'; i += 2; continue; }
      els.push(<strong key={ki++}>{text.slice(i+2, end)}</strong>);
      i = end + 2;
    } else if (text[i] === '`') {
      flush();
      const end = text.indexOf('`', i+1);
      if (end === -1) { buf += '`'; i++; continue; }
      els.push(<code key={ki++} style={{ background: 'rgba(255,255,255,0.12)', borderRadius: 4, padding: '1px 5px', fontFamily: 'ui-monospace, monospace', fontSize: '0.89em' }}>{text.slice(i+1, end)}</code>);
      i = end + 1;
    } else { buf += text[i++]; }
  }
  flush();
  return els;
}

function MarkdownContent({ content, isUser, t }) {
  const lines = content.split('\n');
  const blocks = []; let listItems = null; let ki = 0;

  const flushList = () => {
    if (!listItems) return;
    blocks.push(
      <div key={ki++} style={{ display: 'flex', flexDirection: 'column', gap: 2, paddingLeft: 2 }}>
        {listItems.map((item, i) => (
          <div key={i} style={{ display: 'flex', gap: 7 }}>
            <span style={{ flexShrink: 0, opacity: 0.55 }}>•</span>
            <span>{parseInline(item, ki * 100 + i)}</span>
          </div>
        ))}
      </div>
    );
    listItems = null;
  };

  for (const line of lines) {
    if (line.match(/^[-*•] /)) {
      if (!listItems) listItems = [];
      listItems.push(line.replace(/^[-*•] /, ''));
    } else { flushList();
      if (line === '') blocks.push(<div key={ki++} style={{ height: 5 }} />);
      else blocks.push(<div key={ki++}>{parseInline(line, ki * 200)}</div>);
    }
  }
  flushList();

  return (
    <div style={{
      fontFamily: '-apple-system, system-ui', fontSize: 14.5, lineHeight: 1.58,
      color: isUser ? '#fff' : t.asstText, letterSpacing: -0.28,
      display: 'flex', flexDirection: 'column', gap: 0,
    }}>{blocks}</div>
  );
}

  if (isMem) {

      <div className={isNew ? 'msg-enter' : ''} style={{

        background: t.memBubble,
        border: `0.5px solid ${t.memBorder}`,

        maxWidth: '90%', display: 'flex', gap: 8, alignItems: 'flex-start',
      }}>
        <span style={{ fontSize: 13, flexShrink: 0, marginTop: 1 }}>💭</span>
        <div>
          <div style={{
            fontFamily: '-apple-system, system-ui',
            fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
            textTransform: 'uppercase', color: t.memLabel, marginBottom: 4,
          }}>Memory</div>
          <div style={{
            fontFamily: '-apple-system, system-ui',
            fontSize: 12.5, lineHeight: 1.55, color: t.memText, fontStyle: 'italic',
          }}>{msg.content}</div>
        </div>
      </div>
    );
  }

  return (
    <div className={isNew ? 'msg-enter' : ''} style={{
      display: 'flex',
      flexDirection: 'column',
      alignItems: isUser ? 'flex-end' : 'flex-start',
    }}>
      <div style={{
        background: isUser ? t.userBubble : t.asstBubble,
        borderRadius: isUser ? '18px 18px 5px 18px' : '18px 18px 18px 5px',
        padding: '9px 13px',
        maxWidth: '78%',
        border: isUser ? 'none' : `0.5px solid ${t.border}`,
      }}>
        {isUser
          ? <div style={{ fontFamily: '-apple-system, system-ui', fontSize: 14.5, lineHeight: 1.58, color: '#fff', whiteSpace: 'pre-wrap', wordBreak: 'break-word', letterSpacing: -0.28 }}>{msg.content}</div>
          : <MarkdownContent content={msg.content} isUser={false} t={t} />

      {msg.time && (
        <div style={{
          fontFamily: '-apple-system, system-ui',

          marginTop: 3, marginLeft: isUser ? 0 : 4, marginRight: isUser ? 4 : 0,

}

// ═══════════════════════════════════════════════════════════════════
// MESSAGES LIST
// ═══════════════════════════════════════════════════════════════════

function MessagesList({ t, messages, streamText, isStreaming, endRef, newMsgIds, agentName, onCopy, onFork, onDelete, onPrompt }) {
  const [menuMsg, setMenuMsg] = React.useState(null);
  const [menuY, setMenuY] = React.useState(0);
  const pressTimer = React.useRef(null);

  const startPress = (msg, e) => {
    if (msg.role === 'memory') return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    pressTimer.current = setTimeout(() => { setMenuMsg(msg); setMenuY(y); }, 500);
  };
  const cancelPress = () => { clearTimeout(pressTimer.current); };

  if (messages.length === 0 && !isStreaming) {
    return (
      <div style={{ flex: 1, overflowY: 'auto', paddingTop: 126 }}>
        <EmptyChat t={t} agentName={agentName} onPrompt={onPrompt} />
      </div>
    );
  }

  return (
    <div className="hide-scroll" style={{ flex: 1, overflowY: 'auto', paddingTop: 126, paddingBottom: 12, paddingLeft: 14, paddingRight: 14, display: 'flex', flexDirection: 'column', gap: 9 }}>
      {messages.map(msg => (
        <div
          key={msg.id}
          onMouseDown={e => startPress(msg, e)}
          onMouseUp={cancelPress} onMouseLeave={cancelPress}
          onTouchStart={e => startPress(msg, e)}
          onTouchEnd={cancelPress} onTouchMove={cancelPress}
          onContextMenu={e => { e.preventDefault(); if (msg.role !== 'memory') { setMenuMsg(msg); setMenuY(e.clientY); } }}
        >
          <Bubble t={t} msg={msg} isNew={newMsgIds.has(msg.id)} />
        </div>
      ))}

      {isStreaming && streamText && (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start' }}>
          <div style={{ background: t.asstBubble, borderRadius: '18px 18px 18px 5px', padding: '9px 13px', maxWidth: '78%', border: `0.5px solid ${t.border}` }}>
            <div style={{ fontFamily: '-apple-system, system-ui', fontSize: 14.5, lineHeight: 1.58, color: t.asstText, whiteSpace: 'pre-wrap', wordBreak: 'break-word', letterSpacing: -0.28 }}>{streamText}</div>
          </div>
        </div>
      )}
      {isStreaming && !streamText && <TypingDots t={t} />}

      {menuMsg && (
        <MessageContextMenu
          t={t} msg={menuMsg} posY={menuY}
          onClose={() => setMenuMsg(null)}
          onCopy={onCopy} onFork={onFork} onDelete={onDelete}
        />
      )}

      <div ref={endRef} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SWIPEABLE CONVERSATION ROW
// ═══════════════════════════════════════════════════════════════════

function SwipeConvRow({ conv, active, t, onSelect, onDelete }) {
  const [swipeX, setSwipeX] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const startRef = React.useRef(0);
  const DELETE_W = 70;

  const onStart = clientX => { startRef.current = clientX; setDragging(true); };
  const onMove  = clientX => {
    if (!dragging) return;
    const d = clientX - startRef.current;
    if (d < 0) setSwipeX(Math.max(d, -DELETE_W));
  };
  const onEnd = () => {
    setDragging(false);
    setSwipeX(prev => prev < -30 ? -DELETE_W : 0);
  };

  return (
    <div style={{ position: 'relative', borderRadius: 10, marginBottom: 2, overflow: 'hidden' }}>
      {/* Delete button — only visible when swiped open */}
      {swipeX < -2 && (
        <div onClick={() => onDelete(conv.id)} style={{
          position: 'absolute', right: 0, top: 0, bottom: 0, width: DELETE_W,
          background: '#ff453a', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <IconTrash c="#fff" s={18} />
        </div>
      )}
      {/* Sliding row */}
      <div
        onMouseDown={e => onStart(e.clientX)}
        onMouseMove={e => dragging && onMove(e.clientX)}
        onMouseUp={onEnd} onMouseLeave={onEnd}
        onTouchStart={e => onStart(e.touches[0].clientX)}
        onTouchMove={e => onMove(e.touches[0].clientX)}
        onTouchEnd={onEnd}
        onClick={() => { if (Math.abs(swipeX) < 5) onSelect(conv.id); }}
        style={{
          position: 'relative', zIndex: 1, userSelect: 'none', cursor: 'pointer',
          transform: `translateX(${swipeX}px)`,
          transition: dragging ? 'none' : 'transform 0.22s ease',
          background: active ? t.accentPale : 'transparent',
          borderRadius: 10, padding: '10px 10px',
        }}
      >
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 14.5, fontWeight: active ? 600 : 400, color: active ? t.accent : t.text, letterSpacing: -0.3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1, marginRight: 8 }}>{conv.title}</span>
          <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 11, color: t.textTer, flexShrink: 0 }}>{conv.time}</span>
        </div>
        <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 12, color: t.textSec }}>{conv.count} messages</span>
      </div>
    </div>
  );
}

function MessageContextMenu({ t, msg, posY, onClose, onCopy, onFork, onDelete }) {
  const actions = msg.role === 'user'
    ? [
        { icon: <IconCopy c={t.text} s={16}/>, label: 'Copy',   fn: () => { onCopy(msg.content); onClose(); } },
        { icon: <IconFork c={t.text} s={16}/>, label: 'Fork',   fn: () => { onFork(msg.id); onClose(); } },
        { icon: <IconTrash c="#ff453a" s={16}/>, label: 'Delete', fn: () => { onDelete(msg.id); onClose(); }, danger: true },
      ]
    : [
        { icon: <IconCopy c={t.text} s={16}/>, label: 'Copy',   fn: () => { onCopy(msg.content); onClose(); } },
        { icon: <IconFork c={t.text} s={16}/>, label: 'Fork',   fn: () => { onFork(msg.id); onClose(); } },
        { icon: <IconTrash c="#ff453a" s={16}/>, label: 'Delete', fn: () => { onDelete(msg.id); onClose(); }, danger: true },
      ];

  const menuTop = Math.max(posY - 64, 130);

  return (
    <>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, zIndex: 70 }} />
      <div style={{
        position: 'absolute', zIndex: 75,
        top: menuTop,
        left: msg.role === 'user' ? 'auto' : 14,
        right: msg.role === 'user' ? 14 : 'auto',
        background: t.surface, border: `0.5px solid ${t.border}`,
        borderRadius: 14, padding: '4px 2px',
        display: 'flex', gap: 0,
        boxShadow: '0 10px 40px rgba(0,0,0,0.45)',
        animation: 'fadeIn 0.12s ease',
      }}>
        {actions.map((a, i) => (
          <button key={i} onClick={a.fn} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            padding: '8px 14px', borderRadius: 10,
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
          }}>
            {a.icon}
            <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 10, color: a.danger ? '#ff453a' : t.textSec, letterSpacing: -0.1 }}>{a.label}</span>
          </button>
        ))}
      </div>
    </>
  );
}

function ConversationsDrawer({ t, visible, onClose, convs, activeId, onSelect, onSettings, onConvCreate, onConvDelete }) {
  const W = 298;
  const [isCreating, setIsCreating] = React.useState(false);
  const [newTitle, setNewTitle] = React.useState('');
  const [pullY, setPullY] = React.useState(0);
  const [refreshing, setRefreshing] = React.useState(false);
  const listRef = React.useRef(null);
  const pullStartY = React.useRef(0);
  const PULL_THRESHOLD = 55;

  const onListTouchStart = e => {
    if (listRef.current?.scrollTop === 0) pullStartY.current = e.touches[0].clientY;
  };
  const onListTouchMove = e => {
    if (!pullStartY.current) return;
    const delta = e.touches[0].clientY - pullStartY.current;
    if (delta > 0) setPullY(Math.min(delta * 0.45, PULL_THRESHOLD + 10));
  };
  const onListTouchEnd = () => {
    if (pullY >= PULL_THRESHOLD && !refreshing) {
      setRefreshing(true);
      setTimeout(() => { setRefreshing(false); setPullY(0); pullStartY.current = 0; }, 1200);
    } else { setPullY(0); pullStartY.current = 0; }
  };

  const handleCreate = () => {
    const title = newTitle.trim() || 'New Conversation';
    onConvCreate(title);
    setNewTitle('');
    setIsCreating(false);
  };

  return (
    <>
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0, zIndex: 50,
        background: t.overlay, opacity: visible ? 1 : 0,
        pointerEvents: visible ? 'auto' : 'none', transition: 'opacity 0.26s ease',
      }} />
      <div style={{
        position: 'absolute', top: 0, left: 0, bottom: 0, width: W,
        background: t.drawerBg, borderRight: `0.5px solid ${t.border}`,
        zIndex: 55,
        transform: visible ? 'translateX(0)' : `translateX(-${W}px)`,
        transition: 'transform 0.34s cubic-bezier(0.32, 0.72, 0, 1)',
        display: 'flex', flexDirection: 'column',
      }}>
        {/* Header */}
        <div style={{ paddingTop: 70 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 14px 10px' }}>
            <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 24, fontWeight: 700, letterSpacing: -0.6, color: t.text }}>Chats</span>
            <button
              onClick={() => { setIsCreating(true); setNewTitle(''); }}
              style={{ width: 30, height: 30, borderRadius: '50%', background: t.surface, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
            >
              <IconPlus c={t.accent} s={16} />
            </button>
          </div>

          {/* Inline new conversation input */}
          {isCreating && (
            <div style={{ padding: '0 10px 10px' }}>
              <div style={{ display: 'flex', gap: 6, alignItems: 'center', background: t.surface, borderRadius: 10, padding: '7px 10px', border: `1px solid ${t.accent}44` }}>
                <input
                  type="text" value={newTitle} onChange={e => setNewTitle(e.target.value)} autoFocus
                  placeholder="Conversation title…"
                  onKeyDown={e => { if (e.key === 'Enter') handleCreate(); if (e.key === 'Escape') setIsCreating(false); }}
                  style={{ flex: 1, background: 'none', border: 'none', outline: 'none', fontFamily: '-apple-system, system-ui', fontSize: 13.5, color: t.text, letterSpacing: -0.2 }}
                />
                <button onClick={handleCreate} style={{ background: t.accent, border: 'none', borderRadius: 7, padding: '3px 9px', cursor: 'pointer', fontFamily: '-apple-system, system-ui', fontSize: 12, fontWeight: 600, color: '#fff' }}>Add</button>
                <button onClick={() => setIsCreating(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2, display: 'flex' }}>
                  <IconClose c={t.textSec} s={13} />
                </button>
              </div>
            </div>
          )}

          <div style={{ height: 0.5, background: t.border, margin: '0 0 6px' }} />
        </div>

        {/* Conversation list with pull-to-refresh */}
        <div
          ref={listRef}
          className="hide-scroll"
          style={{ flex: 1, overflowY: 'auto', padding: '4px 8px 8px' }}
          onTouchStart={onListTouchStart}
          onTouchMove={onListTouchMove}
          onTouchEnd={onListTouchEnd}
        >
          {/* Pull-to-refresh indicator */}
          {(pullY > 8 || refreshing) && (
            <div style={{
              display: 'flex', justifyContent: 'center', alignItems: 'center',
              height: refreshing ? 40 : Math.max(pullY - 8, 0),
              transition: refreshing ? 'none' : 'height 0.1s',
              overflow: 'hidden',
            }}>
              <div style={{
                width: 22, height: 22, borderRadius: '50%',
                border: `2px solid ${t.border}`,
                borderTopColor: t.accent,
                animation: refreshing ? 'spin 0.7s linear infinite' : 'none',
                transform: !refreshing ? `rotate(${pullY * 4}deg)` : 'none',
              }} />
            </div>
          )}
          {convs.map(conv => (
            <SwipeConvRow
              key={conv.id} conv={conv} active={conv.id === activeId} t={t}
              onSelect={onSelect} onDelete={onConvDelete}
            />
          ))}
        </div>

        {/* Footer */}
        <div style={{ borderTop: `0.5px solid ${t.border}`, padding: '8px 8px 36px', display: 'flex', flexDirection: 'column', gap: 2, flexShrink: 0 }}>
          {[
            { label: 'Agent Settings', icon: '⚙️', screen: 'agent' },
            { label: 'Tools Settings', icon: '🔧', screen: 'tools' },
            { label: 'Server', icon: '🌐', screen: 'connection' },
          ].map(item => (
            <button key={item.screen} onClick={() => onSettings(item.screen)} style={{ width: '100%', textAlign: 'left', background: 'transparent', border: 'none', cursor: 'pointer', borderRadius: 10, padding: '10px 10px', display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 16 }}>{item.icon}</span>
              <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 14, color: t.textSec, letterSpacing: -0.3 }}>{item.label}</span>
              <svg style={{ marginLeft: 'auto' }} width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M1 1l5 5-5 5" stroke={t.textTer} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

// ─── Connection Settings Sheet ───
function ConnectionSheet({ t, visible, onClose }) {
  const H = 520;
  const [url, setUrl] = React.useState(() => localStorage.getItem('persistServerUrl') || 'http://localhost:8000');
  const [status, setStatus] = React.useState(null); // null | 'testing' | 'ok' | 'error'

  const saveUrl = (v) => { setUrl(v); localStorage.setItem('persistServerUrl', v); };

  const testConnection = async () => {
    setStatus('testing');
    try {
      const res = await fetch(`${url.replace(/\/$/, '')}/api/v1/agents/`, { signal: AbortSignal.timeout(4000) });
      setStatus(res.ok ? 'ok' : 'error');
    } catch {
      setStatus('error');
    }
  };

  return (
    <>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, zIndex: 60, background: t.overlay, opacity: visible ? 1 : 0, pointerEvents: visible ? 'auto' : 'none', transition: 'opacity 0.24s ease' }} />

        position: 'absolute', left: 0, right: 0, bottom: 0, height: H,
        background: t.sheetBg, borderRadius: '22px 22px 0 0',
        borderTop: `0.5px solid ${t.border}`, zIndex: 65,
        transform: visible ? 'translateY(0)' : `translateY(${H}px)`,
        transition: 'transform 0.38s cubic-bezier(0.32, 0.72, 0, 1)',

      }}>
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 10 }}>
          <div style={{ width: 36, height: 4, borderRadius: 2, background: t.textTer }} />
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 18px 12px', borderBottom: `0.5px solid ${t.border}` }}>
          <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 16, fontWeight: 600, color: t.text, letterSpacing: -0.4 }}>Server Connection</span>
          <button onClick={onClose} style={{ background: t.surface, border: 'none', cursor: 'pointer', width: 26, height: 26, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <IconClose c={t.textSec} s={13} />
          </button>
        </div>

        <div className="hide-scroll" style={{ flex: 1, overflowY: 'auto', padding: '20px 18px 40px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          {/* URL input */}
          <div>
            <div style={{ fontFamily: '-apple-system, system-ui', fontSize: 12, fontWeight: 600, letterSpacing: 0.3, textTransform: 'uppercase', color: t.textSec, marginBottom: 8 }}>Backend URL</div>
            <input
              value={url} onChange={e => saveUrl(e.target.value)}
              placeholder="http://100.x.x.x:8000"
              style={{
                width: '100%', background: t.surface, border: `0.5px solid ${t.border}`,
                borderRadius: 10, color: t.text, fontFamily: 'ui-monospace, monospace',
                fontSize: 13, padding: '10px 12px', outline: 'none',
              }}
            />
            <div style={{ fontFamily: '-apple-system, system-ui', fontSize: 11.5, color: t.textSec, marginTop: 6 }}>
              Your FastAPI backend URL — Tailscale IP, ngrok URL, or localhost for dev.
            </div>
          </div>

          {/* Test button + status */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <button onClick={testConnection} style={{
              background: t.accent, border: 'none', borderRadius: 10, cursor: 'pointer',
              padding: '10px 18px', fontFamily: '-apple-system, system-ui',
              fontSize: 14, fontWeight: 600, color: '#fff',
            }}>{status === 'testing' ? 'Testing…' : 'Test Connection'}</button>
            {status === 'ok'    && <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 13, color: '#30d158' }}>✓ Connected</span>}
            {status === 'error' && <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 13, color: '#ff453a' }}>✗ Unreachable</span>}
          </div>

// ─── Mini Toggle ───
function MiniToggle({ t, value, onChange }) {
  return (
    <div
      onClick={() => onChange(!value)}
      style={{
        width: 44, height: 26, borderRadius: 13,
        background: value ? t.accent : t.surface,
        position: 'relative', cursor: 'pointer', flexShrink: 0,
        transition: 'background 0.2s',
        border: `0.5px solid ${value ? t.accent : t.border}`,
      }}
    >
      <div style={{
        position: 'absolute', top: 3,
        left: value ? 21 : 3,
        width: 18, height: 18, borderRadius: '50%',
        background: '#fff',
        transition: 'left 0.2s',
        boxShadow: '0 1px 3px rgba(0,0,0,0.3)',
      }} />
    </div>
  );
}

// ─── Mini Slider ───
function MiniSlider({ t, value, min, max, step = 0.01, onChange }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6 }}>
      <input
        type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        style={{ flex: 1, accentColor: t.accent, height: 4, cursor: 'pointer' }}
      />
      <span style={{
        fontFamily: '-apple-system, system-ui', fontSize: 13,
        color: t.accent, minWidth: 32, textAlign: 'right', letterSpacing: -0.2,
      }}>{value}</span>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark"
}/*EDITMODE-END*/;

function PersistApp() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = THEMES[tweaks.theme] || THEMES.dark;

  const [showConvs, setShowConvs] = React.useState(false);
  const [showMemory, setShowMemory] = React.useState(false);
  const [showAgentPicker, setShowAgentPicker] = React.useState(false);
  const [settingsScreen, setSettingsScreen] = React.useState(null);
  const [activeConv, setActiveConv] = React.useState('1');
  const [activeAgentId, setActiveAgentId] = React.useState('a1');
  const [convList, setConvList] = React.useState(CONVS);
  const [messagesByConv, setMessagesByConv] = React.useState(MSGS_BY_CONV);
  const [input, setInput] = React.useState('');
  const [isStreaming, setIsStreaming] = React.useState(false);
  const [streamText, setStreamText] = React.useState('');
  const [newMsgIds, setNewMsgIds] = React.useState(new Set());
  const endRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  const activeAgent = AGENTS.find(a => a.id === activeAgentId) || AGENTS[0];
  const messages = messagesByConv[activeConv] || [];
  const activeTitle = convList.find(c => c.id === activeConv)?.title || 'Chat';

  // Auto-scroll
  React.useEffect(() => {
    if (endRef.current) endRef.current.parentElement.scrollTop = endRef.current.parentElement.scrollHeight;
  }, [messages, streamText, activeConv]);

  const addMessage = (convId, msg) => {
    setMessagesByConv(prev => ({ ...prev, [convId]: [...(prev[convId] || []), msg] }));
    setNewMsgIds(prev => new Set([...prev, msg.id]));
  };

  const handleSend = (overrideText) => {
    const content = (overrideText || input).trim();
    if (isStreaming) {
      if (streamRef.current) clearInterval(streamRef.current);
      if (streamText) addMessage(activeConv, { id: `s${Date.now()}`, role: 'assistant', content: streamText, time: now });
      setStreamText(''); setIsStreaming(false);
      return;
    }
    if (!content) return;
    setInput('');
    const uid = `u${Date.now()}`;
    addMessage(activeConv, { id: uid, role: 'user', content, time: now });

    // Update conv message count
    setConvList(prev => prev.map(c => c.id === activeConv ? { ...c, count: c.count + 1, time: 'Just now' } : c));

    setIsStreaming(true); setStreamText('');
    const full = STREAM_RESPONSES[Math.floor(Math.random() * STREAM_RESPONSES.length)];
    let i = 0;
    streamRef.current = setInterval(() => {
      i += 5; setStreamText(full.slice(0, i));
      if (i >= full.length) {
        clearInterval(streamRef.current);
        const aid = `a${Date.now()}`;
        addMessage(activeConv, { id: aid, role: 'assistant', content: full, time: now });
        setConvList(prev => prev.map(c => c.id === activeConv ? { ...c, count: c.count + 1 } : c));
        setStreamText(''); setIsStreaming(false);
      }
    }, 20);
  };

  const handleSelectConv = (id) => {
    setActiveConv(id); setShowConvs(false);
    if (streamRef.current) clearInterval(streamRef.current);
    setIsStreaming(false); setStreamText('');
  };

  const handleConvCreate = (title) => {
    const id = `new${Date.now()}`;
    const newConv = { id, title, count: 0, time: 'Just now' };
    setConvList(prev => [newConv, ...prev]);
    setActiveConv(id);
    setShowConvs(false);
  };

  const handleConvDelete = (id) => {
    setConvList(prev => prev.filter(c => c.id !== id));
    if (activeConv === id) {
      const remaining = convList.filter(c => c.id !== id);
      setActiveConv(remaining.length > 0 ? remaining[0].id : null);
    }
  };

  const handleCopyMsg = (content) => { try { navigator.clipboard.writeText(content); } catch(e) {} };
  const handleForkMsg = (msgId) => {
    const msgs = messagesByConv[activeConv] || [];
    const idx = msgs.findIndex(m => m.id === msgId);
    if (idx === -1) return;
    const id = `fork${Date.now()}`;
    const forkedMsgs = msgs.slice(0, idx + 1);
    const srcConv = convList.find(c => c.id === activeConv);
    setConvList(prev => [{ id, title: `${srcConv?.title || 'Chat'} (fork)`, count: forkedMsgs.length, time: 'Just now' }, ...prev]);
    setMessagesByConv(prev => ({ ...prev, [id]: forkedMsgs }));
    setActiveConv(id);
  };
  const handleDeleteMsg = (msgId) => {
    setMessagesByConv(prev => ({ ...prev, [activeConv]: (prev[activeConv] || []).filter(m => m.id !== msgId) }));
  };

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
      <IOSDevice width={402} height={874} dark={true}>
        <div style={{
          height: '100%', background: t.bg,
          display: 'flex', flexDirection: 'column',
          position: 'relative', overflow: 'hidden',
        }}>
          <ChatHeader
            t={t}
            title={activeTitle}
            agentName={activeAgent.name}
            onMenu={() => setShowConvs(true)}
            onMemory={() => setShowMemory(true)}
            onAgentPill={() => setShowAgentPicker(v => !v)}
          />
          <AgentDropdown
            t={t}
            visible={showAgentPicker}
            agents={AGENTS}
            activeId={activeAgentId}
            onSelect={id => setActiveAgentId(id)}
            onClose={() => setShowAgentPicker(false)}
          />
          <MessagesList
            t={t} messages={messages}
            streamText={streamText} isStreaming={isStreaming}
            endRef={endRef} newMsgIds={newMsgIds}
            agentName={activeAgent.name}
            onCopy={handleCopyMsg}
            onFork={handleForkMsg}
            onDelete={handleDeleteMsg}
            onPrompt={s => { setInput(s); handleSend(s); }}
          />
          <ChatInput
            t={t} value={input} onChange={setInput}
            onSend={handleSend} isStreaming={isStreaming}
          />
          <ConversationsDrawer
            t={t} visible={showConvs} onClose={() => setShowConvs(false)}
            convs={convList} activeId={activeConv} onSelect={handleSelectConv}
            onSettings={screen => { setShowConvs(false); setSettingsScreen(screen); }}
            onConvCreate={handleConvCreate}
            onConvDelete={handleConvDelete}
          />
          <MemorySheet t={t} visible={showMemory} onClose={() => setShowMemory(false)} />
          <AgentSettingsSheet
            t={t}
            visible={settingsScreen === 'agent'}
            onClose={() => setSettingsScreen(null)}
          />
          <ToolsSettingsSheet
            t={t}
            visible={settingsScreen === 'tools'}
            onClose={() => setSettingsScreen(null)}
          />
          <ConnectionSheet
            t={t}
            visible={settingsScreen === 'connection'}
            onClose={() => setSettingsScreen(null)}
          />
        </div>
      </IOSDevice>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio
          label="Color scheme"
          value={tweaks.theme}
          options={['dark', 'midnight', 'obsidian']}
          onChange={v => setTweak('theme', v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PersistApp />);
</script>
